header h1 {

/* Background */
body {
    background: linear-gradient(to bottom, hsl(54, 98%, 52%), hsl(41, 93%, 54%));
}

h2 {
    color: #97b806;

header h1 {
    animation: rebond 1s linear infinite;
}

@keyframes rebond {
    0% { transform: translateY(1px); }
    50% { transform: translateY(-5px); }
    100% { transform: translateY(1px); }
}

h4 {
    color: #43a2be;
    font-family: 'Bradley Hand', cursive;
    font-size: 1.75em;
}
#celly-image:hover {
    animation: rotateFast 2s infinite;
}
@keyframes rotateFast {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(25deg); }
    100% { transform: rotate(0deg); }
}
</style>
