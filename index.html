<style>
body{
  width: 100%;
  min-height: 100vh;
  margin: 0;
  position: relative;
  background:
    linear-gradient(to bottom, #001a66, #0066ff, #00cfff, #aef2ff) left center / 50% 100% no-repeat,
    url('télécharger (4).jpg') right center / 50% 100% no-repeat;
}
#celly {
  position: absolute;
  top: 50%;
  left: 75%;
  transform: translate(-50%, -50%);
  width: 400px;
  max-width: 80%;
  height: auto;
  animation: rebound 2s linear infinite;
}
@keyframes rebound {
    0% { transform: translate(-50%, calc(-50% + 1.5px)); }
    50% { transform: translate(-50%, calc(-50% - 5px)); }
    100% { transform: translate(-50%, calc(-50% + 1.5px)); }
}
#celly:hover {
    animation: rebond 0.80s linear infinite;
}

@keyframes rebond {
    0% { transform: translate(-50%, calc(-50% + 3px)); }
    50% { transform: translate(-50%, calc(-50% - 5px)); }
    100% { transform: translate(-50%, calc(-50% + 3px)); }
}
#celly-image {
    animation: rotateFast 2s infinite;
    position: absolute;
    top: 20px;
    right: 20px;
}
@keyframes rotateFast {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(25deg); }
    100% { transform: rotate(0deg); }
}
header h1 {
  text-align: center;
  font-family: 'Bradley Hand', cursive;
  font-size: 4em;
  margin: 40px 0 0;
  line-height: 1.1;
}
header h1 .title-line1 {

  color: #ff6600;
}
header h1 .title-line2 {

  color: #65dbff;
}
#ac-image {
  position: absolute;
  top: 37%;
  left: 75%;
  transform: translate(-50%, 0);
  width: 500px;
  max-width: 80%;
  z-index: 2;
}
#ac-image img {
  width: 100%;
  height: auto;
  display: block;
}
#ac-text {
  position: absolute;
  bottom: 257px;
  left: 34%;
  font-family: 'Bradley Hand', cursive;
  font-weight: bold;
  transform: translateX(-50%);
  color: rgb(236, 144, 23);
  font-size: 1.4rem;
  padding: 6px 10px;
  border-radius: 10px;
  animation : rebond1 0.75s linear infinite;
}
@keyframes rebond1 {
    0% { transform: translate(-50%, calc(-50% + 1px)); }
    50% { transform: translate(-50%, calc(-50% - 1.5px)); }
    100% { transform: translate(-50%, calc(-50% + 1px)); }
}
#Porcella {
  position: absolute;
  bottom: -20px;
  right: -60px;
  width: 250px;
  height: auto;
}
#bulle {
  position: absolute;
  top: 50%;
  left: 25%;
  transform: translate(-50%, -50%);
  width: 340px;
  max-width: 40%;
  padding: 30px;
  text-align: center;
  background-color: rgba(255, 255, 255, 0.15);
  border: 2px solid white;
  border-radius: 25px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
  color: white;
  font-family: 'Bradley Hand', cursive;
  font-size: 1.4rem;
  z-index: 3;
  display: block;
  text-decoration: none;
  cursor: pointer;
  transition: transform 0.2s, background-color 0.2s;
}
#bulle:hover {
  background-color: rgba(255, 255, 255, 0.3);
  transform: translate(-50%, -50%) scale(1.05);
}
.deco {
  position: absolute;
  z-index: 2;
  user-select: none;
  pointer-events: none;
  filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.3));
  animation: flotte 3s ease-in-out infinite;
}
@keyframes flotte {
  0%   { transform: translateY(0) rotate(0deg); }
  50%  { transform: translateY(-12px) rotate(8deg); }
  100% { transform: translateY(0) rotate(0deg); }
}
.deco.d1  { top: 8%;  left: 4%;  font-size: 2.5rem; animation-delay: 0s; }
.deco.d2  { top: 12%; left: 43%; font-size: 4rem;   animation-delay: 0.4s; }

.deco.d6  { top: 62%; left: 44%; font-size: 2.2rem; animation-delay: 1s; }
.deco.d7  { top: 72%; left: 9%;  font-size: 3rem;   animation-delay: 0.2s; }
.deco.d8  { top: 90%; left: 38%; font-size: 3.6rem; animation-delay: 1.4s; }
.deco.d9  { top: 92%; left: 6%;  font-size: 2rem;   animation-delay: 0.9s; }
