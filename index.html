body{
  width: 100%;
  min-height: 100vh;
  margin: 0;
  position: relative;
  background: 
    linear-gradient(
      to right,
      rgb(64, 169, 255) 0%,
      rgb(64, 169, 255) 50%,
      transparent 50%

    url('télécharger (4).jpg') right center / 50% 100% no-repeat;

#celly {
  position: absolute;
  top: 50%;
  left: 75%;
  transform: translate(-50%, -50%);
  width: 400px;
  max-width: 80%;
  height: auto;
  animation: rebound 2s linear infinite;
}
@keyframes rebound {
    0% { transform: translate(-50%, calc(-50% + 1.5px)); }
    50% { transform: translate(-50%, calc(-50% - 5px)); }
    100% { transform: translate(-50%, calc(-50% + 1.5px)); }
}
#celly:hover {
    animation: rebond 0.80s linear infinite;
}

@keyframes rebond {
    0% { transform: translate(-50%, calc(-50% + 3px)); }
    50% { transform: translate(-50%, calc(-50% - 5px)); }
    100% { transform: translate(-50%, calc(-50% + 3px)); }
}
#celly-image {
    animation: rotateFast 2s infinite;
    position: absolute;
    top: 20px;
    right: 20px;
}
@keyframes rotateFast {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(25deg); }
    100% { transform: rotate(0deg); }
}
header h1 {
  text-align: center;
  font-family: 'Bradley Hand', cursive;
  font-size: 4em;
  margin: 40px 0 0;
  line-height: 1.1;

  height: auto;

}
#ac-text {

  bottom: 257px;
  left: 34%;
  font-family: 'Bradley Hand', cursive;
  font-weight: bold;
  transform: translateX(-50%);
  color: rgb(236, 144, 23);
  font-size: 1.4rem;
  padding: 6px 10px;
  border-radius: 10px;
  animation : rebond1 0.75s linear infinite;
}
@keyframes rebond1 {
    0% { transform: translate(-50%, calc(-50% + 1px)); }
    50% { transform: translate(-50%, calc(-50% - 1.5px)); }
    100% { transform: translate(-50%, calc(-50% + 1px)); }
